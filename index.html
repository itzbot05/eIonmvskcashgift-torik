<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cash Rewards Program</title>
    <style>
        /* ব্যাকগ্রাউন্ড কালার আপনার দেওয়া ছবির মতো */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(180deg, #d4edda 0%, #ffffff 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }

        /* এক কোণে মাঝারি সাইজের লাইভ বাটন */
        .live-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #ff0000;
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            box-shadow: 0 0 10px rgba(255,0,0,0.5);
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        .main-container {
            margin-top: 80px;
            text-align: center;
            width: 90%;
            max-width: 400px;
        }

        h1 {
            color: #2e4a31;
            font-size: 22px;
            margin-bottom: 20px;
        }

        /* গ্লাস ইফেক্ট কার্ড */
        .card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px 20px;
            border: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 8px 32px rgba(0,0,0,0.05);
        }

        .amount {
            font-size: 48px;
            font-weight: bold;
            color: #1b5e20;
            margin: 10px 0;
        }

        input {
            width: 80%;
            padding: 12px;
            margin: 20px 0;
            border: 1px solid #c3e6cb;
            border-radius: 10px;
            outline: none;
            font-size: 16px;
        }

        .claim-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        /* উইনার লিস্ট (ছবির বদলে রঙিন সার্কেল) */
        .winner-box {
            position: fixed;
            bottom: 20px;
            width: 90%;
            max-width: 400px;
            background: rgba(255,255,255,0.7);
            border-radius: 15px;
            padding: 10px;
            overflow: hidden;
            height: 50px;
        }

        .winner-content {
            display: flex;
            align-items: center;
            animation: slideUp 8s infinite linear;
        }

        .avatar-circle {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: #28a745;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 10px;
        }

        @keyframes slideUp {
            0% { transform: translateY(50px); }
            10% { transform: translateY(0); }
            90% { transform: translateY(0); }
            100% { transform: translateY(-50px); }
        }
    </style>
</head>
<body>

    <div class="live-badge">● LIVE NOW</div>

    <div class="main-container">
        <h1>CASH REWARDS PROGRAM<br>GIVING SELECTION</h1>
        
        <div class="card">
            <div style="font-size: 14px; color: #666;">GOAL: $5000</div>
            <div class="amount">$5000</div>
            <div style="font-size: 14px; color: #666;">Potential Reward</div>
            
            <input type="text" placeholder="Enter your $Cashtag">
            <br>
            <button class="claim-btn">CONFIRM & WIN</button>
        </div>
    </div>

    <div class="winner-box" id="winnerBox">
        <div class="winner-content">
            <div class="avatar-circle" id="avatarLetter">S</div>
            <div id="winnerName">Sifat just won $5000!</div>
        </div>
    </div>

    <script>
        const winners = [
            { name: "Sifat", letter: "S" },
            { name: "Akash", letter: "A" },
            { name: "Tahsin", letter: "T" },
            { name: "Naim", letter: "N" },
            { name: "Sarah", letter: "S" }
        ];

        let index = 0;
        setInterval(() => {
            index = (index + 1) % winners.length;
            document.getElementById('avatarLetter').innerText = winners[index].letter;
            document.getElementById('winnerName').innerText = winners[index].name + " just won $5000!";
        }, 4000);
    </script>

</body>
</html>
