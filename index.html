<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cash Rewards</title>
    <style>
        /* পুরো স্ক্রিন জুড়ে গ্রাডিয়েন্ট ফিক্স */
        html, body {
            margin: 0;
            padding: 0;
            min-height: 100%;
            width: 100%;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            /* আপনার পছন্দের সেই হালকা সবুজ কালার */
            background: linear-gradient(180deg, #d8efde 0%, #e8f5e9 100%);
            background-attachment: fixed; /* স্ক্রল করলেও ব্যাকগ্রাউন্ড সরবে না */
        }

        .live-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #ff4b4b;
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            box-shadow: 0 2px 8px rgba(255,0,0,0.3);
            z-index: 100;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 60px;
            width: 100%;
        }

        h1 {
            color: #2d4f33;
            font-size: 20px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 30px;
        }

        /* কার্ড ডিজাইন আরও নিখুঁত করা হয়েছে */
        .card {
            background: rgba(255, 255, 255, 0.6); /* স্বচ্ছ সাদা */
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 40px 25px;
            width: 85%;
            max-width: 350px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            text-align: center;
        }

        .goal-text {
            color: #557a5b;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .main-amount {
            font-size: 55px;
            font-weight: 800;
            color: #1b5e20;
            margin: 0;
            line-height: 1;
        }

        .sub-text {
            color: #6a8e71;
            font-size: 14px;
            margin-top: 10px;
        }

        input {
            width: 90%;
            padding: 15px;
            margin: 25px 0 15px 0;
            border: 1.5px solid #bddbc3;
            border-radius: 12px;
            font-size: 16px;
            background: rgba(255,255,255,0.9);
            outline: none;
            text-align: center;
        }

        .win-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 18px 0;
            width: 100%;
            border-radius: 35px;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(40, 167, 69, 0.3);
            cursor: pointer;
        }

        /* উইনার নোটিফিকেশন */
        .winner-notif {
            position: fixed;
            bottom: 20px;
            background: white;
            width: 85%;
            max-width: 340px;
            padding: 12px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .circle {
            width: 35px;
            height: 35px;
            background: #28a745;
            color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            margin-right: 12px;
        }

        .winner-info {
            font-size: 14px;
            color: #333;
        }
    </style>
</head>
<body>

    <div class="live-badge">● LIVE NOW</div>

    <div class="container">
        <h1>Cash Rewards Program<br>Giving Selection</h1>

        <div class="card">
            <div class="goal-text">GOAL: $5000</div>
            <div class="main-amount">$5000</div>
            <div class="sub-text">Potential Reward</div>

            <input type="text" placeholder="Enter your $Cashtag">
            <button class="win-btn">CONFIRM & WIN</button>
        </div>
    </div>

    <div class="winner-notif">
        <div class="circle" id="c">S</div>
        <div class="winner-info" id="w">Sifat just won $5000!</div>
    </div>

    <script>
        const data = [
            {n: "Sifat", l: "S"}, {n: "Akash", l: "A"}, 
            {n: "Tahsin", l: "T"}, {n: "Naim", l: "N"}
        ];
        let i = 0;
        setInterval(() => {
            i = (i + 1) % data.length;
            document.getElementById('c').innerText = data[i].l;
            document.getElementById('w').innerText = data[i].n + " just won $5000!";
        }, 3500);
    </script>

</body>
</html>
