<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cash Rewards Program</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        
        body {
            background: #c3e6cb; /* ছবির সেই হালকা সবুজ ব্যাকগ্রাউন্ড */
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 20px 0;
        }

        .phone-screen {
            width: 100%;
            max-width: 380px;
            text-align: center;
            position: relative;
        }

        /* LIVE NOW বাটন উপরে মাঝখানে */
        .live-badge {
            background: #ff3b30;
            color: white;
            padding: 8px 20px;
            border-radius: 25px;
            display: inline-block;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 15px;
            box-shadow: 0 0 15px rgba(255,0,0,0.4);
        }

        h1 {
            font-size: 18px;
            color: #3e5a42;
            line-height: 1.3;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        /* প্রোগ্রেস সার্কেল ডিজাইন */
        .progress-container {
            position: relative;
            width: 180px;
            height: 180px;
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .circle-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 15px solid rgba(0,0,0,0.1);
            border-radius: 50%;
        }

        .circle-progress {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 15px solid transparent;
            border-top: 15px solid #a3c9ad; /* ছবির সেই স্টিল গ্রিন কালার */
            border-left: 15px solid #a3c9ad;
            border-radius: 50%;
            transform: rotate(45deg);
        }

        .circle-content {
            z-index: 2;
        }

        .circle-content div { font-size: 14px; color: #555; }
        .circle-content h2 { font-size: 40px; color: #2d4531; margin: 5px 0; }

        /* ইনপুট বক্স */
        .input-box {
            background: rgba(255,255,255,0.4);
            border: 2px solid rgba(0,0,0,0.1);
            padding: 12px;
            border-radius: 12px;
            width: 90%;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            font-weight: bold;
            color: #333;
        }

        /* কনফার্ম বাটন (ছবির মতো ডার্ক গ্রে) */
        .confirm-btn {
            background: #4a5d4e;
            color: white;
            width: 90%;
            padding: 15px;
            border-radius: 30px;
            border: none;
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            margin-bottom: 25px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* উইনার টেবিল */
        .winners-section {
            background: rgba(255,255,255,0.2);
            width: 95%;
            margin: 0 auto;
            border-radius: 15px;
            padding: 10px;
        }

        .winner-row {
            display: flex;
            align-items: center;
            padding: 8px 10px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            font-size: 14px;
            color: #333;
        }

        .avatar {
            width: 30px;
            height: 30px;
            background: #4a5d4e;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 10px;
            font-size: 12px;
            font-weight: bold;
        }

        .timer {
            margin-top: 15px;
            font-weight: bold;
            font-size: 18px;
            color: #2d4531;
        }
    </style>
</head>
<body>

<div class="phone-screen">
    <div class="live-badge">((•)) LIVE NOW</div>
    
    <h1>CASH REWARDS PROGRAM<br>GIVING SELECTION</h1>

    <div class="progress-container">
        <div class="circle-bg"></div>
        <div class="circle-progress"></div>
        <div class="circle-content">
            <div>GOAL: $5000</div>
            <h2>$350</h2>
            <div>given</div>
        </div>
    </div>

    <div class="input-box">
        <span style="margin-right:10px; color:#777;">$</span> 
        <span>SELECTED_NO_3</span>
    </div>

    <button class="confirm-btn">CONFIRM SELECTION & WIN</button>

    <div class="winners-section">
        <div style="font-size: 12px; font-weight: bold; margin-bottom: 10px; color: #444;">LAST WINNERS (SELECTED)</div>
        
        <div class="winner-row">
            <div class="avatar">S</div> <span>Sarah ($100)</span>
        </div>
        <div class="winner-row">
            <div class="avatar">S</div> <span>Sifat ($75)</span>
        </div>
        <div class="winner-row">
            <div class="avatar">N</div> <span>Naim ($25)</span>
        </div>
        <div class="winner-row">
            <div class="avatar">T</div> <span>Tahsin ($110)</span>
        </div>
    </div>

    <div class="timer">ENDS: <span id="time">02:12</span></div>
</div>

<script>
    // টাইমার ফাংশন
    let minutes = 2;
    let seconds = 12;
    setInterval(() => {
        if(seconds > 0) seconds--;
        else { minutes--; seconds = 59; }
        document.getElementById('time').innerText = 
            (minutes < 10 ? "0" + minutes : minutes) + ":" + 
            (seconds < 10 ? "0" + seconds : seconds);
    }, 1000);
</script>

</body>
</html>
